version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: claudelens-postgres
    environment:
      POSTGRES_DB: claudelens
      POSTGRES_USER: claudelens
      POSTGRES_PASSWORD: claudelens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: claudelens-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: claudelens-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data:
