spring:
  application:
    name: claude-lens-backend

  # PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claudelens}
    username: ${DB_USERNAME:claudelens}
    password: ${DB_PASSWORD:claudelens}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # MongoDB
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/claudelens}

    # Redis
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production}
  expiration: 86400000
